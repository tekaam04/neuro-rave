services:
  neuro-rave:
    build: .
    ports:
      - "8733:8733"
    environment:
      # SIMULATE is read from config/constants.json. Set SIMULATE=1 in .env if you
      # need a per-environment override (it takes precedence over the JSON value).
      - BIOSEMI_HOST=host.docker.internal
      - WS_HOST=0.0.0.0
      - WS_PORT=8733
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
      - SPOTIFY_REFRESH_TOKEN=${SPOTIFY_REFRESH_TOKEN:-}
      - SPOTIFY_USER_ID=${SPOTIFY_USER_ID:-default}
      - SPOTIFY_PLAYLIST_CALM=${SPOTIFY_PLAYLIST_CALM:-}
      - SPOTIFY_PLAYLIST_FOCUS=${SPOTIFY_PLAYLIST_FOCUS:-}
      - SPOTIFY_PLAYLIST_HYPE=${SPOTIFY_PLAYLIST_HYPE:-}
      - SPOTIFY_PLAYLIST_DEEP_FOCUS=${SPOTIFY_PLAYLIST_DEEP_FOCUS:-}
      # Playback: context (playlist) | pool (CSV track pool).
      - SPOTIFY_PLAYBACK_MODE=${SPOTIFY_PLAYBACK_MODE:-context}
      - SPOTIFY_TRACK_POOL_CSV=${SPOTIFY_TRACK_POOL_CSV:-}
      - SPOTIFY_MIN_SWITCH_S=${SPOTIFY_MIN_SWITCH_S:-}
      - SPOTIFY_POOL_MIN_INTERVAL_S=${SPOTIFY_POOL_MIN_INTERVAL_S:-}
      - SPOTIFY_DEVICE_ID=${SPOTIFY_DEVICE_ID:-}
      - SPOTIFY_MARKET=${SPOTIFY_MARKET:-}
      # OAuth callback for dashboard /setup (browser hits host:8733)
      - SPOTIFY_OAUTH_REDIRECT_URI=${SPOTIFY_OAUTH_REDIRECT_URI:-}
      # Spotify forbids ``localhost`` in redirect URIs; use loopback IP (see Spotify docs Apr 2025).
      - SPOTIFY_OAUTH_PUBLIC_HOST=${SPOTIFY_OAUTH_PUBLIC_HOST:-127.0.0.1}
      - SPOTIFY_OAUTH_SUCCESS_URL=${SPOTIFY_OAUTH_SUCCESS_URL:-http://localhost:5173/}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/app/src
      - ./main.py:/app/main.py
      - ./config:/app/config
      - ./scripts:/app/scripts
      - ./get_spotify_refresh_token.py:/app/get_spotify_refresh_token.py
    restart: unless-stopped

  native:
    build: ./native
    profiles: ["native"]
    ports:
      - "8734:8733"
    environment:
      - BIOSEMI_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config
    # Run bridge in background, then ws_server in foreground (same container = same LSL multicast scope)
    command: sh -c "neuro_lsl_bridge & sleep 2 && neuro_ws_server"
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
      - ./config:/config
      # Bind mount hides image /app; this volume starts empty — install deps at runtime for Linux (Rollup natives).
      - /app/node_modules
    environment:
      - VITE_WS_URL=ws://localhost:8733/ws
      - VITE_API_BASE_URL=http://127.0.0.1:8733
    # Populate anonymous node_modules volume (Linux arm64/x64 optional deps); image build alone is not enough with ./dashboard:/app.
    command: sh -c "npm install && npm run dev"
    depends_on:
      - neuro-rave
    restart: unless-stopped
