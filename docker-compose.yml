services:
  neuro-rave:
    build: .
    ports:
      - "8733:8733"
    environment:
      # Default 0 = real EEG (BioSemi TCP / LSL path). For demos without hardware: SIMULATE=1 in .env.
      - SIMULATE=${SIMULATE:-0}
      - BIOSEMI_HOST=host.docker.internal
      - WS_HOST=0.0.0.0
      - WS_PORT=8733
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
      - SPOTIFY_REFRESH_TOKEN=${SPOTIFY_REFRESH_TOKEN:-}
      - SPOTIFY_USER_ID=${SPOTIFY_USER_ID:-default}
      - SPOTIFY_PLAYLIST_CALM=${SPOTIFY_PLAYLIST_CALM:-}
      - SPOTIFY_PLAYLIST_FOCUS=${SPOTIFY_PLAYLIST_FOCUS:-}
      - SPOTIFY_PLAYLIST_HYPE=${SPOTIFY_PLAYLIST_HYPE:-}
      - SPOTIFY_PLAYLIST_DEEP_FOCUS=${SPOTIFY_PLAYLIST_DEEP_FOCUS:-}
      # Playback: context | recommendations | pool (CSV track pool, no /recommendations API).
      - SPOTIFY_PLAYBACK_MODE=${SPOTIFY_PLAYBACK_MODE:-context}
      - SPOTIFY_TRACK_POOL_CSV=${SPOTIFY_TRACK_POOL_CSV:-}
      - SPOTIFY_MIN_SWITCH_S=${SPOTIFY_MIN_SWITCH_S:-}
      - SPOTIFY_POOL_MIN_INTERVAL_S=${SPOTIFY_POOL_MIN_INTERVAL_S:-}
      - SPOTIFY_SEED_GENRES=${SPOTIFY_SEED_GENRES:-}
      - SPOTIFY_DEVICE_ID=${SPOTIFY_DEVICE_ID:-}
      - SPOTIFY_MARKET=${SPOTIFY_MARKET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/app/src
      - ./main.py:/app/main.py
      - ./config:/app/config
      - ./scripts:/app/scripts
      - ./get_spotify_refresh_token.py:/app/get_spotify_refresh_token.py
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
      - ./config:/config
      # Bind mount hides image /app; this volume starts empty — install deps at runtime for Linux (Rollup natives).
      - /app/node_modules
    environment:
      - VITE_WS_URL=ws://localhost:8733/ws
    # Populate anonymous node_modules volume (Linux arm64/x64 optional deps); image build alone is not enough with ./dashboard:/app.
    command: sh -c "npm install && npm run dev"
    depends_on:
      - neuro-rave
    restart: unless-stopped
